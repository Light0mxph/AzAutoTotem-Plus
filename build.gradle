plugins {
    id 'fabric-loom' version '1.7.4'
}

version = "1.0.0"
group = "com.azautotem"

repositories {
    maven { url "https://maven.terraformersmc.com/releases/" }
    maven { url "https://maven.shedaniel.me/" }
    maven { url = "https://maven.fabricmc.net/" }
    mavenCentral()
}

dependencies {
    modImplementation "com.terraformersmc:modmenu:11.0.1"
    modImplementation "me.shedaniel.cloth:cloth-config-fabric:15.0.127"
    include "me.shedaniel.cloth:cloth-config-fabric:15.0.127"
    minecraft "com.mojang:minecraft:1.21"
    mappings "net.fabricmc:yarn:1.21+build.2:v2"
    modImplementation "net.fabricmc:fabric-loader:0.15.11"
    modImplementation "net.fabricmc.fabric-api:fabric-api:0.100.4+1.21"
}

tasks.withType(JavaCompile).configureEach {
    it.options.release = 21
}

java {
    sourceCompatibility = JavaVersion.VERSION_21
    targetCompatibility = JavaVersion.VERSION_21
}

processResources {
    inputs.property "version", project.version
    filesMatching("fabric.mod.json") {
        expand "version": project.version
    }
}

// El jefe final: Forzar a remapJar a usar tu nombre exacto
tasks.named('remapJar') {
    archiveFileName = "AzAutoTotem+ v1.0.0.jar"
}
